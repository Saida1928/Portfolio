<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saida Vali Shaik | Portfolio</title>

<!-- GOOGLE FONTS -->
<link href="https://fonts.googleapis.com/css?family=Exo:700|Abel&display=swap" rel="stylesheet">

<style>
/* ================= RESET ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  color: white;
  font-family: 'Abel', sans-serif;
  perspective: 1200px;
  overflow-x: hidden;
  padding: 40px 20px;
}

/* ================= PARTICLES ================= */
#particles {
  position: fixed;
  inset: 0;
  z-index: -3;
  background: radial-gradient(circle at top, #1a0000, #000);
}

/* ================= BATMAN LOGO ================= */
.batman {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: -2;
  opacity: 0.05;
  animation: float 8s ease-in-out infinite;
}

.batman-shape {
  width: 320px;
  height: 180px;
  background: black;
  border-radius: 50%;
  clip-path: polygon(
    0% 50%, 10% 35%, 20% 45%, 30% 40%, 40% 50%,
    50% 35%, 60% 50%, 70% 40%, 80% 45%, 90% 35%, 100% 50%,
    85% 70%, 15% 70%
  );
}

@keyframes float {
  0%,100% { transform: translateY(-10px); }
  50% { transform: translateY(10px); }
}

/* ================= TITLE ================= */
.title {
  text-align: center;
  margin-bottom: 70px;
}

.title h1 {
  font-family: 'Exo', sans-serif;
  font-size: clamp(2.2rem, 5vw, 3.5rem);
  text-shadow: 0 0 25px red;
}

.red { color: #ff2a2a; }

/* ================= CARD LAYOUT ================= */
.card-container {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

/* ================= 3D CARD ================= */
.card {
  width: 260px;
  height: 360px;
  padding: 22px;
  text-align: center;
  border-radius: 20px;
  transform-style: preserve-3d;
  transform: rotateX(75deg) translateY(-200px);
  transition: 0.6s ease;
  box-shadow: 0 25px 60px rgba(255,0,0,.35);
}

.card:hover {
  transform: rotateX(0deg) translateY(0);
  box-shadow: 0 45px 90px rgba(255,0,0,.6);
}

/* CARD COLORS */
.card1 { background: linear-gradient(135deg,#ff512f,#dd2476); }
.card2 { background: linear-gradient(135deg,#6a11cb,#2575fc); }
.card3 { background: linear-gradient(135deg,#ff4e50,#b31217); }

/* CARD TEXT */
.card h3 {
  font-size: 1.6rem;
  margin-bottom: 14px;
}

.card p {
  font-size: 1rem;
  line-height: 1.5;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
  body { padding: 20px; }
  .card { width: 100%; max-width: 320px; }
}
</style>
</head>

<body>

<!-- BACKGROUNDS -->
<canvas id="particles"></canvas>
