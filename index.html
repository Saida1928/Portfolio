<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio Builder</title>

<style>
:root {
  --bg-light: #f8fafc;
  --bg-dark: #0f172a;
  --text-light: #0f172a;
  --text-dark: #f8fafc;
  --primary: #2563eb;
  --card: #ffffff;
}

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg-light);
  color: var(--text-light);
}

body.dark {
  background: var(--bg-dark);
  color: var(--text-dark);
}

.app {
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #1e293b;
  color: white;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.sidebar button {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border: none;
  background: transparent;
  color: white;
  cursor: pointer;
  text-align: left;
}

.sidebar button.active {
  background: rgba(255,255,255,0.15);
}

/* MAIN */
.main {
  flex: 1;
  padding: 30px;
}

.card {
  background: var(--card);
  color: #0f172a;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 20px;
}

body.dark .card {
  background: #020617;
  color: white;
}

input, textarea, select {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
}

button.primary {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px 14px;
  cursor: pointer;
}

.preview h2 {
  color: var(--primary);
}
</style>
</head>

<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Portfolio Builder</h2>
    <button onclick="showSection('settings')" class="active">⚙ Settings</button>
    <button onclick="showSection('resume')">📄 Resume</button>
    <button onclick="showSection('portfolios')">📁 Portfolios</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- SETTINGS -->
    <div id="settings" class="card">
      <h3>Appearance Settings</h3>

      <label>Theme</label>
      <select onchange="setTheme(this.value)">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>

      <label>Primary Color</label>
      <select onchange="setColor(this.value)">
        <option value="#2563eb">Blue</option>
        <option value="#059669">Green</option>
        <option value="#e11d48">Red</option>
      </select>

      <label>Font</label>
      <select onchange="setFont(this.value)">
        <option value="system-ui">Default</option>
        <option value="serif">Serif</option>
        <option value="monospace">Mono</option>
      </select>
    </div>

    <!-- RESUME -->
    <div id="resume" class="card" style="display:none">
      <h3>Edit Resume</h3>

      <input id="name" placeholder="Full Name" />
      <textarea id="summary" placeholder="Professional Summary"></textarea>
      <textarea id="skills" placeholder="Skills"></textarea>
      <textarea id="experience" placeholder="Experience"></textarea>
      <textarea id="projects" placeholder="Projects"></textarea>
      <textarea id="education" placeholder="Education"></textarea>

      <button class="primary" onclick="downloadResume()">Download Resume (PDF)</button>

      <div class="preview">
        <h2 id="pName"></h2>
        <p id="pSummary"></p>
        <p><b>Skills:</b> <span id="pSkills"></span></p>
        <p><b>Experience:</b> <span id="pExperience"></span></p>
        <p><b>Projects:</b> <span id="pProjects"></span></p>
        <p><b>Education:</b> <span id="pEducation"></span></p>
      </div>
    </div>

    <!-- PORTFOLIOS -->
    <div id="portfolios" class="card" style="display:none">
      <h3>Saved Portfolios</h3>

      <input id="portfolioName" placeholder="Portfolio Name" />
      <button class="primary" onclick="savePortfolio()">Save Current Portfolio</button>

      <hr>

      <h4>Upload Resume (TXT)</h4>
      <input type="file" accept=".txt" onchange="uploadResume(this)" />

      <ul id="portfolioList"></ul>
    </div>

  </div>
</div>

<script>
let current = "settings";
let portfolios = JSON.parse(localStorage.getItem("portfolios") || "[]");

function showSection(id) {
  document.getElementById(current).style.display = "none";
  document.getElementById(id).style.display = "block";
  current = id;
}

function setTheme(t) {
  document.body.className = t === "dark" ? "dark" : "";
}

function setColor(c) {
  document.documentElement.style.setProperty("--primary", c);
}

function setFont(f) {
  document.body.style.fontFamily = f;
}

function updatePreview() {
  pName.textContent = name.value;
  pSummary.textContent = summary.value;
  pSkills.textContent = skills.value;
  pExperience.textContent = experience.value;
  pProjects.textContent = projects.value;
  pEducation.textContent = education.value;
}

document.querySelectorAll("input, textarea").forEach(e =>
  e.addEventListener("input", updatePreview)
);

function downloadResume() {
  window.print();
}

function savePortfolio() {
  const p = {
    name: portfolioName.value || "Untitled Portfolio",
    data: {
      name: name.value,
      summary: summary.value,
      skills: skills.value,
      experience: experience.value,
      projects: projects.value,
      education: education.value
    }
  };
  portfolios.push(p);
  localStorage.setItem("portfolios", JSON.stringify(portfolios));
  renderPortfolios();
}

function uploadResume(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;

    name.value = text.split("\n")[0] || "";
    summary.value = text.slice(0, 300);
    skills.value = text;
    experience.value = text;
    projects.value = "";
    education.value = "";

    updatePreview();
    portfolioName.value = file.name.replace(".txt", "");
    showSection("resume");
  };
  reader.readAsText(file);
}

function renderPortfolios() {
  portfolioList.innerHTML = "";
  portfolios.forEach(p => {
    const li = document.createElement("li");
    li.textContent = p.name;
    li.onclick = () => loadPortfolio(p);
    portfolioList.appendChild(li);
  });
}

function loadPortfolio(p) {
  name.value = p.data.name;
  summary.value = p.data.summary;
  skills.value = p.data.skills;
  experience.value = p.data.experience;
  projects.value = p.data.projects;
  education.value = p.data.education;
  updatePreview();
  showSection("resume");
}

renderPortfolios();
updatePreview();
</script>

</body>
</html>
